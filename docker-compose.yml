version: "3.9"

services:
  # P1: PostgreSQL for local development
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: github_mcp
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: github_mcp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_mcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://github_mcp:localdev@db:5432/github_mcp
      APP_ENV: development
      APP_PORT: "8000"
      # Copy your .env values here or use an env_file:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:8000/auth/callback}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
